<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pwofil Vandè — Ayiti Market</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23B91C3C'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='26' fill='%23FBF6EC'>AM</text></svg>">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#B91C3C" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14181F" media="(prefers-color-scheme: dark)">

<script>
  (function () {
    try {
      var saved = localStorage.getItem('am-theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --krem:        #FBF6EC;
    --krem-dim:     #F3ECDC;
    --lank:        #14181F;
    --lank-soft:    #4A4F5A;
    --wouj:        #B91C3C;
    --wouj-dark:    #8C1530;
    --ble:         #16335E;
    --ble-soft:     #2A4D80;
    --lo:          #E1962F;
    --lo-soft:      #F2C26B;
    --liy:         #E4DCC8;
    --blan:        #FFFFFF;
    --lank-light:  #2A3040;
    --lo-text:     #8A5D12;
    --display: 'Manrope', sans-serif;
    --body: 'Manrope', sans-serif;
    --mono: 'Space Mono', monospace;
    --radius: 14px;
    --container: 1180px;
  }
  :root[data-theme="dark"]{
    --krem:        #14181F;
    --krem-dim:     #1B202A;
    --lank:        #EDE8DA;
    --lank-soft:    #A7AAB3;
    --wouj:        #E14D63;
    --wouj-dark:    #F2718A;
    --ble:         #5C8AD6;
    --ble-soft:     #3D6BB0;
    --lo:          #F2B259;
    --lo-soft:      #E1962F;
    --liy:         #2A3040;
    --blan:        #1E2430;
    --lank-light:  #343B4C;
    --lo-text:     #F2C26B;
  }
  :root[data-theme="dark"] body{ background: var(--krem); color: var(--lank); }
  :root[data-theme="dark"] header{ background: rgba(20,24,31,0.92); }
  :root[data-theme="dark"] .seller-card,
  :root[data-theme="dark"] .acc-card{ background: var(--blan); border-color: var(--liy); }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{ font-family: var(--body); background: var(--krem); color: var(--lank); line-height:1.5; -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width: var(--container); margin:0 auto; padding: 0 24px; }

  header{
    position: sticky; top:0; z-index: 100;
    background: rgba(251,246,236,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--liy);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 24px; max-width: var(--container); margin: 0 auto; gap: 24px;
  }
  .logo{ display:flex; align-items:center; gap:10px; font-family: var(--display); font-weight:700; font-size: 1.5rem; letter-spacing: -0.01em; color: var(--lank); }
  .logo .dot{ width:10px; height:10px; border-radius:50%; background: linear-gradient(135deg, var(--wouj), var(--lo)); }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding: 11px 22px; border-radius: 100px; font-weight:700; font-size:0.9rem;
    transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    white-space:nowrap; border:none; cursor:pointer; font-family:var(--body);
  }
  .btn-primary{ background: var(--wouj); color: #fff; box-shadow: 0 2px 0 var(--wouj-dark); }
  .btn-primary:hover{ background: var(--wouj-dark); transform: translateY(-1px); }
  .btn-ghost{ color: var(--lank); border: 1.5px solid var(--liy); background: transparent; }
  .btn-ghost:hover{ border-color: var(--lank); }
  .btn-sm{ padding:8px 16px; font-size:0.82rem; }

  main{ padding: 48px 0 90px; min-height:60vh; }

  .seller-card{
    background:var(--blan); border:1px solid var(--liy); border-radius:var(--radius);
    padding:28px; display:flex; gap:20px; align-items:center; margin-bottom:36px; flex-wrap:wrap;
  }
  .seller-avatar{
    width:84px; height:84px; border-radius:50%; background: var(--ble-soft); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.8rem;
    flex-shrink:0;
  }
  .seller-name{ font-family:var(--display); font-weight:800; font-size:1.5rem; display:flex; align-items:center; gap:8px; }
  .v-badge-inline{
    font-size:0.7rem; font-weight:800; color:var(--ble); border:1px solid var(--ble); border-radius:100px;
    padding:2px 10px; white-space:nowrap;
  }
  .seller-meta{ display:flex; gap:18px; flex-wrap:wrap; margin-top:8px; font-size:0.85rem; color:var(--lank-soft); }
  .seller-meta span{ display:flex; align-items:center; gap:6px; }

  .sec-title{ font-family:var(--display); font-weight:800; font-size:1.2rem; margin-bottom:18px; }
  .listings-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap:18px; }

  .card{
    background: var(--blan); border-radius: var(--radius); overflow:hidden;
    border: 1px solid var(--liy); transition: transform .22s, box-shadow .22s; cursor:pointer;
  }
  .card:hover{ transform: translateY(-5px); box-shadow: 0 20px 36px -14px rgba(20,24,31,0.18); }
  .card-img{ height: 150px; overflow:hidden; background:var(--liy); }
  .card-img img{ width:100%; height:100%; object-fit:cover; }
  .card-body{ padding: 14px; }
  .card-price{ font-family: var(--mono); font-weight:700; font-size:1rem; color: var(--wouj-dark); margin-bottom: 4px; }
  .card-title{ font-weight:700; font-size: 0.9rem; margin-bottom: 6px; line-height:1.3; }
  .card-loc{ font-size: 0.76rem; color: var(--lank-soft); }

  .empty-box{ text-align:center; padding:60px 20px; color:var(--lank-soft); }
  .loading-spin{ text-align:center; padding:40px; color:var(--lank-soft); }
</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="logo"><span class="dot"></span>Ayiti Market</a>
    <a href="index.html" class="btn btn-ghost btn-sm">← Tounen nan Mache a</a>
  </div>
</header>

<main class="wrap">
  <div id="loadingState" class="loading-spin">Ap chaje pwofil vandè a...</div>

  <div id="notFoundState" class="empty-box" style="display:none">
    <p>Vandè sa a pa jwenn.</p>
    <a href="index.html" class="btn btn-primary">Tounen nan Akèy →</a>
  </div>

  <div id="sellerContent" style="display:none">
    <div class="seller-card">
      <div class="seller-avatar" id="sAvatar">??</div>
      <div>
        <div class="seller-name"><span id="sName">—</span><span class="v-badge-inline" id="sVerified" style="display:none">✓ Verifye</span></div>
        <div class="seller-meta">
          <span id="sJoined">—</span>
          <span id="sCount">—</span>
          <span id="sLocation" style="display:none"></span>
        </div>
      </div>
    </div>

    <div class="sec-title">Anons Vandè a</div>
    <div id="sellerListingsGrid" class="listings-grid"></div>
    <div id="sellerListingsEmpty" class="empty-box" style="display:none">
      <p>Vandè sa a pa gen anons aktif kounye a.</p>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://cisjnsdnxqvgqjuzwobk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpc2puc2RueHF2Z3FqdXp3b2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTI2OTQsImV4cCI6MjA5Nzk4ODY5NH0.rWwbLUOs8TjZpHD19fDYX4B9mOIyn-eAFpcwGcdav_E';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const API_BASE = 'https://ayiti-market-40ce.onrender.com';

  function mapListing(row) {
    const img = (row.images && row.images.length) ? row.images[0] : 'https://images.unsplash.com/photo-1556909114-44e3e70034e2?w=800&q=80';
    return {
      id: row.id, title: row.title,
      price: row.price_label || (row.price_val ? `${Number(row.price_val).toLocaleString('fr-FR')} HTG` : 'Sou demann'),
      loc: row.location || '', img
    };
  }

  function cardHTML(item) {
    return `
      <div class="card" data-id="${item.id}" onclick="window.location.href='index.html#listing-${item.id}'">
        <div class="card-img"><img src="${item.img}" alt="${item.title}" loading="lazy"></div>
        <div class="card-body">
          <div class="card-price">${item.price}</div>
          <div class="card-title">${item.title}</div>
          <div class="card-loc">${item.loc}</div>
        </div>
      </div>`;
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const sellerId = params.get('id');
    if (!sellerId) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('notFoundState').style.display = 'block';
      return;
    }

    try {
      // Pwofil vandè a
      const { data: profile, error: profileErr } = await supabaseClient
        .from('profiles')
        .select('full_name, location, created_at')
        .eq('id', sellerId)
        .single();

      // Anons vandè a (backend API, piblik)
      const res = await fetch(`${API_BASE}/api/listings`);
      const allListings = await res.json();
      const sellerListings = allListings.filter(row => row.seller_id === sellerId);

      if (profileErr && sellerListings.length === 0) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('notFoundState').style.display = 'block';
        return;
      }

      const name = profile?.full_name || sellerListings[0]?.seller_name || 'Vandè';
      const joinedDate = profile?.created_at ? new Date(profile.created_at) : null;
      const verified = sellerListings.some(l => l.verified);

      document.getElementById('sName').textContent = name;
      document.getElementById('sAvatar').textContent = name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
      document.getElementById('sCount').innerHTML = `📦 ${sellerListings.length} anons`;
      if (joinedDate) {
        document.getElementById('sJoined').innerHTML = `🗓️ Sou platfòm depi ${joinedDate.toLocaleDateString('fr-FR', { year: 'numeric', month: 'long' })}`;
      } else {
        document.getElementById('sJoined').style.display = 'none';
      }
      if (profile?.location) {
        const locEl = document.getElementById('sLocation');
        locEl.innerHTML = `📍 ${profile.location}`;
        locEl.style.display = '';
      }
      if (verified) document.getElementById('sVerified').style.display = '';

      const gridEl = document.getElementById('sellerListingsGrid');
      if (sellerListings.length === 0) {
        document.getElementById('sellerListingsEmpty').style.display = 'block';
      } else {
        gridEl.innerHTML = sellerListings.map(row => cardHTML(mapListing(row))).join('');
      }

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('sellerContent').style.display = 'block';
    } catch (err) {
      console.error(err);
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('notFoundState').style.display = 'block';
    }
  }
  init();
</script>
</body>
</html>
