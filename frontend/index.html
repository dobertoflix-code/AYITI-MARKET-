<!doctype html>
<html lang="ht">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ayiti Market</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --surface: #ffffff;
      --ink: #1b2523;
      --muted: #64706d;
      --line: #ded8cf;
      --brand: #0f766e;
      --brand-dark: #0b4f49;
      --accent: #c2410c;
      --gold: #d99a25;
      --shadow: 0 18px 45px rgba(27, 37, 35, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(222, 216, 207, 0.8);
      background: rgba(247, 244, 239, 0.92);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 14px 0;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 180px;
      font-weight: 800;
      font-size: 1.05rem;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.28);
    }

    .brand-mark svg {
      width: 22px;
      height: 22px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-button,
    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .icon-button {
      width: 42px;
      background: var(--surface);
      color: var(--ink);
      border-color: var(--line);
    }

    .icon-button:hover,
    .primary-button:hover,
    .category-button:hover {
      transform: translateY(-1px);
    }

    .primary-button {
      gap: 8px;
      padding: 0 16px;
      background: var(--brand);
      color: #fff;
      font-weight: 750;
    }

    .main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 54px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 24px;
      align-items: stretch;
      margin-bottom: 26px;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 360px;
      padding: 42px;
      border-radius: 8px;
      background: #113d38;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    .hero-copy::after {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(217, 154, 37, 0.28);
    }

    .kicker {
      width: fit-content;
      margin: 0 0 14px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      color: #f6d98d;
      font-size: 0.8rem;
      font-weight: 750;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 560px;
      margin: 18px 0 26px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 1.02rem;
    }

    .hero-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 14px;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
    }

    .search-box input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
    }

    .hero-media {
      min-height: 360px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #d8c7b1;
    }

    .hero-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .market-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin: 12px 0 22px;
    }

    .category-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }

    .category-button {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-weight: 700;
    }

    .category-button.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .sort-select {
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 650;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(27, 37, 35, 0.06);
    }

    .product-image {
      aspect-ratio: 4 / 3;
      background: #eee7dd;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 220ms ease;
    }

    .product-card:hover .product-image img {
      transform: scale(1.035);
    }

    .product-body {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
    }

    .product-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .product-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .badge {
      flex: 0 0 auto;
      padding: 3px 8px;
      border-radius: 999px;
      background: #fff2db;
      color: #8a4d05;
      font-size: 0.74rem;
      font-weight: 750;
    }

    .seller {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: auto;
    }

    .price {
      font-size: 1.08rem;
      font-weight: 850;
      color: var(--brand-dark);
    }

    .small-button {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: #fff;
      color: var(--brand-dark);
      font-weight: 750;
    }

    .empty-state {
      display: none;
      padding: 34px;
      margin-top: 16px;
      border: 1px dashed #c8bfb2;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.62);
      text-align: center;
      color: var(--muted);
    }

    .empty-state.visible {
      display: block;
    }

    svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    @media (max-width: 940px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-copy,
      .hero-media {
        min-height: 300px;
      }

      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .topbar-inner,
      .main {
        width: min(100% - 22px, 1180px);
      }

      .brand span {
        display: none;
      }

      .hero-copy {
        padding: 26px;
      }

      .hero-tools,
      .market-controls {
        grid-template-columns: 1fr;
      }

      .product-grid {
        grid-template-columns: 1fr;
      }

      .primary-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand" aria-label="Ayiti Market">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 10h16l-2 10H6L4 10Z"></path><path d="M8 10a4 4 0 0 1 8 0"></path></svg>
          </div>
          <span>Ayiti Market</span>
        </div>
        <div class="nav-actions">
          <button class="icon-button" type="button" aria-label="Favorites">
            <svg viewBox="0 0 24 24"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 0 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"></path></svg>
          </button>
          <button class="icon-button" type="button" aria-label="Cart">
            <svg viewBox="0 0 24 24"><path d="M6 6h15l-1.5 8h-12L6 6Z"></path><path d="M6 6 5.4 3H3"></path><path d="M8 20h.01"></path><path d="M18 20h.01"></path></svg>
          </button>
          <button class="primary-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            Vann
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="kicker">Marketplace lokal</p>
          <h1 id="page-title">Achte ak vann pwodwi Ayiti pi fasil.</h1>
          <p>Jwenn manje lokal, atizana, rad, teknoloji, ak sevis nan men vande ki toupre ou.</p>
          <div class="hero-tools">
            <label class="search-box" for="searchInput">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m16 16 4 4"></path></svg>
              <input id="searchInput" type="search" placeholder="Chache pwodwi, vande, vil..." autocomplete="off">
            </label>
            <button class="primary-button" type="button" id="searchButton">Chache</button>
          </div>
        </div>
        <div class="hero-media" aria-hidden="true">
          <img src="https://images.unsplash.com/photo-1604719312566-8912e9227c6a?auto=format&fit=crop&w=1100&q=82" alt="">
        </div>
      </section>

      <section aria-label="Product catalog">
        <div class="market-controls">
          <div class="category-list" id="categoryList" aria-label="Categories"></div>
          <select class="sort-select" id="sortSelect" aria-label="Sort products">
            <option value="featured">Pi popile</option>
            <option value="priceLow">Pri ki pi ba</option>
            <option value="priceHigh">Pri ki pi wo</option>
            <option value="newest">Nouvo</option>
          </select>
        </div>

        <div class="status-row">
          <span id="statusText">Nap chaje pwodwi yo...</span>
          <span id="sourceText"></span>
        </div>

        <div class="product-grid" id="productGrid"></div>
        <div class="empty-state" id="emptyState">
          Pa gen pwodwi ki matche rechech sa a.
        </div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = "https://ayiti-market-40ce.onrender.com";

    const fallbackProducts = [
      {
        id: "coffee-001",
        title: "Kafe Jakmel griye",
        seller: "Lakou Kafe",
        city: "Jakmel",
        category: "Manje",
        price: 950,
        image: "https://images.unsplash.com/photo-1447933601403-0c6688de566e?auto=format&fit=crop&w=700&q=80",
        createdAt: "2026-07-04"
      },
      {
        id: "basket-002",
        title: "Panye atizanal an pay",
        seller: "Men Lakay",
        city: "Okay",
        category: "Atizana",
        price: 1400,
        image: "https://images.unsplash.com/photo-1571781926291-c477ebfd024b?auto=format&fit=crop&w=700&q=80",
        createdAt: "2026-07-03"
      },
      {
        id: "shirt-003",
        title: "Chemiz koton lokal",
        seller: "Mode Kreyol",
        city: "Petyonvil",
        category: "Rad",
        price: 2200,
        image: "https://images.unsplash.com/photo-1523381294911-8d3cead13475?auto=format&fit=crop&w=700&q=80",
        createdAt: "2026-07-01"
      },
      {
        id: "phone-004",
        title: "Telefon Android debloke",
        seller: "Tech509",
        city: "Delma",
        category: "Teknoloji",
        price: 18500,
        image: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=700&q=80",
        createdAt: "2026-06-29"
      },
      {
        id: "soap-005",
        title: "Savon natirel kokoye",
        seller: "Bel Po",
        city: "Gonayiv",
        category: "Sante",
        price: 375,
        image: "https://images.unsplash.com/photo-1607006483224-238049b5cc38?auto=format&fit=crop&w=700&q=80",
        createdAt: "2026-06-28"
      },
      {
        id: "honey-006",
        title: "Siwo myel monn",
        seller: "Ruche Nasyonal",
        city: "Kenscoff",
        category: "Manje",
        price: 1200,
        image: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?auto=format&fit=crop&w=700&q=80",
        createdAt: "2026-06-24"
      },
      {
        id: "chair-007",
        title: "Chez bwa travay men",
        seller: "Atelye Bwa",
        city: "Kap Ayisyen",
        category: "Kay",
        price: 6800,
        image: "https://images.unsplash.com/photo-1506439773649-6e0eb8cfb237?auto=format&fit=crop&w=700&q=80",
        createdAt: "2026-06-20"
      },
      {
        id: "repair-008",
        title: "Reparasyon laptop",
        seller: "Fix Pro HT",
        city: "Tabarre",
        category: "Sevis",
        price: 2500,
        image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=700&q=80",
        createdAt: "2026-06-18"
      }
    ];

    const state = {
      products: [],
      query: "",
      category: "Tout",
      sort: "featured",
      loadedFromApi: false
    };

    const productGrid = document.querySelector("#productGrid");
    const categoryList = document.querySelector("#categoryList");
    const searchInput = document.querySelector("#searchInput");
    const searchButton = document.querySelector("#searchButton");
    const sortSelect = document.querySelector("#sortSelect");
    const statusText = document.querySelector("#statusText");
    const sourceText = document.querySelector("#sourceText");
    const emptyState = document.querySelector("#emptyState");

    function formatPrice(value) {
      return new Intl.NumberFormat("ht-HT", {
        style: "currency",
        currency: "HTG",
        maximumFractionDigits: 0
      }).format(Number(value || 0));
    }

    function normalizeProduct(product, index) {
      return {
        id: product.id || `product-${index}`,
        title: product.title || product.name || "Pwodwi san non",
        seller: product.seller || product.vendor || "Vande lokal",
        city: product.city || product.location || "Ayiti",
        category: product.category || "Lot",
        price: Number(product.price || 0),
        image: product.image || product.imageUrl || fallbackProducts[index % fallbackProducts.length].image,
        createdAt: product.createdAt || product.created_at || "2026-01-01"
      };
    }

    function categories() {
      return ["Tout", ...new Set(state.products.map((product) => product.category))];
    }

    function filteredProducts() {
      const query = state.query.trim().toLowerCase();
      let items = state.products.filter((product) => {
        const matchesCategory = state.category === "Tout" || product.category === state.category;
        const haystack = `${product.title} ${product.seller} ${product.city} ${product.category}`.toLowerCase();
        return matchesCategory && (!query || haystack.includes(query));
      });

      if (state.sort === "priceLow") {
        items = [...items].sort((a, b) => a.price - b.price);
      } else if (state.sort === "priceHigh") {
        items = [...items].sort((a, b) => b.price - a.price);
      } else if (state.sort === "newest") {
        items = [...items].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      }

      return items;
    }

    function renderCategories() {
      categoryList.innerHTML = "";
      categories().forEach((category) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `category-button${category === state.category ? " active" : ""}`;
        button.textContent = category;
        button.addEventListener("click", () => {
          state.category = category;
          render();
        });
        categoryList.appendChild(button);
      });
    }

    function renderProducts(items) {
      productGrid.innerHTML = "";
      items.forEach((product) => {
        const article = document.createElement("article");
        article.className = "product-card";
        const imageWrap = document.createElement("div");
        const image = document.createElement("img");
        const body = document.createElement("div");
        const meta = document.createElement("div");
        const title = document.createElement("h2");
        const badge = document.createElement("span");
        const seller = document.createElement("p");
        const footer = document.createElement("div");
        const price = document.createElement("span");
        const button = document.createElement("button");

        imageWrap.className = "product-image";
        image.src = product.image;
        image.alt = product.title;
        body.className = "product-body";
        meta.className = "product-meta";
        title.className = "product-title";
        badge.className = "badge";
        seller.className = "seller";
        footer.className = "product-footer";
        price.className = "price";
        button.className = "small-button";
        button.type = "button";

        title.textContent = product.title;
        badge.textContent = product.category;
        seller.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s7-4.4 7-11a7 7 0 1 0-14 0c0 6.6 7 11 7 11Z"></path><circle cx="12" cy="10" r="2.5"></circle></svg>';
        seller.append(`${product.seller} - ${product.city}`);
        price.textContent = formatPrice(product.price);
        button.textContent = "Gade";

        imageWrap.append(image);
        meta.append(title, badge);
        footer.append(price, button);
        body.append(meta, seller, footer);
        article.append(imageWrap, body);
        productGrid.appendChild(article);
      });
    }

    function render() {
      const items = filteredProducts();
      renderCategories();
      renderProducts(items);
      emptyState.classList.toggle("visible", items.length === 0);
      statusText.textContent = `${items.length} pwodwi disponib`;
      sourceText.textContent = state.loadedFromApi ? "Done API" : "Done demo";
    }

    async function loadProducts() {
      try {
        const response = await fetch(`${API_BASE}/products`, { headers: { Accept: "application/json" } });
        if (!response.ok) {
          throw new Error(`API returned ${response.status}`);
        }
        const payload = await response.json();
        const products = Array.isArray(payload) ? payload : payload.products;
        if (!Array.isArray(products) || products.length === 0) {
          throw new Error("API returned no products");
        }
        state.products = products.map(normalizeProduct);
        state.loadedFromApi = true;
      } catch (error) {
        state.products = fallbackProducts;
        state.loadedFromApi = false;
      }
      render();
    }

    searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    searchButton.addEventListener("click", () => {
      state.query = searchInput.value;
      render();
    });

    sortSelect.addEventListener("change", (event) => {
      state.sort = event.target.value;
      render();
    });

    loadProducts();
  </script>
</body>
</html>
